      <p class="sub">Play against a friend anywhere</p>
      <div class="online-choices">
        <button class="online-choice-btn" onclick="onlineStartHost()">
          <span class="choice-icon">🏠</span>
          <span class="choice-label">Host a game<br><small style="opacity:.5;font-size:9px">Get a code</small></span>
        </button>
        <button class="online-choice-btn" onclick="showOnlineModal('join')">
          <span class="choice-icon">🔑</span>
          <span class="choice-label">Join a game<br><small style="opacity:.5;font-size:9px">Enter code</small></span>
        </button>
      </div>
      <button class="btn btn-back" onclick="closeOnlineModal()">Cancel</button>
    `;

  } else if (screen === 'hosting') {
    panel.innerHTML = `
      <h2>Your Game Code</h2>
      <p class="game-code-label">Share this with your friend</p>
      <div class="game-code-display" style="cursor:pointer;user-select:none"
           onclick="copyGameCode(this,'${extra}')">${extra}</div>
      <div class="game-code-label" id="copy-label" style="margin-top:-8px">tap to copy</div>
      <div class="online-waiting">
        <div class="online-waiting-msg">Waiting for opponent<span class="waiting-dots">…</span></div>
      </div>
      <button class="btn btn-back" onclick="cancelHosting()">Cancel</button>
    `;

  } else if (screen === 'join') {
    panel.innerHTML = `
      <h2>Join a Game</h2>
      <p class="sub">Enter your friend's 4-letter code</p>
      <div class="code-input-row">
        <input id="join-code-input" class="code-input" maxlength="4"
          placeholder="CODE" autocomplete="off" spellcheck="false"
          oninput="this.value=this.value.toUpperCase().replace(/[^BCDFGHJKLMNPQRSTVWXZ]/g,'')"
          onkeydown="if(event.key==='Enter') onlineJoin()">
      </div>
      <div id="join-error" style="font-size:11px;color:#d85050;min-height:16px;text-align:center;font-weight:700;"></div>
      <div style="display:flex;gap:8px;width:100%;">
        <button class="btn btn-back" style="flex:1" onclick="showOnlineModal('choose')">Back</button>
        <button class="btn" style="flex:2" onclick="onlineJoin()">Join Game</button>
      </div>
    `;
    setTimeout(() => document.getElementById('join-code-input')?.focus(), 80);

  } else if (screen === 'connected') {
    modal.classList.remove('active');
  }
}

function closeOnlineModal() {
  document.getElementById('online-modal').classList.remove('active');
  // Return to new game modal if we came from there
  showNewGameModal();
}

// ══════════════════════════════
// HOST FLOW
// ══════════════════════════════
async function onlineStartHost() {
  // Generate unique code (retry if already exists)
  let code, exists = true, attempts = 0;
  while (exists && attempts < 10) {
    code = genCode();
    const snap = await fbDb.ref(`games/${code}`).get();
    exists = snap.exists() && snap.val().guestConnected;
    attempts++;
  }

  onlineState.gameCode = code;
  onlineState.myRole   = 'O';
  registerGameCode(code);
  onlineState.myName   = gs.names.O;

  // Build initial game state in Firebase
  const fresh = defaultState();
  fresh.playerXType = 'online';
  fresh.names.O     = gs.names.O;  // keep host's name

  await fbDb.ref(`games/${code}`).set({
    board:             fresh.board,
    turn:              fresh.turn,
    gameOver:          false,
    scores:            {O: 0, X: 0},
    names:             fresh.names,
    emojiPair:         fresh.emojiPair,
    hostConnected:     true,
    guestConnected:    false,
    lastActivity:      firebase.database.ServerValue.TIMESTAMP,
    newGameRequested:  false,
  });

  gs.playerXType = 'online';
  saveState();
  showOnlineModal('hosting', code);
  attachOnlineListener(code);
  setupPresence(code, 'host');
}

// ══════════════════════════════
// GUEST FLOW
// ══════════════════════════════
async function onlineJoin() {
  const input = document.getElementById('join-code-input');
  const errEl = document.getElementById('join-error');
  const code  = (input?.value || '').trim().toUpperCase();

  if (code.length !== 4) { errEl.textContent = 'Enter a 4-letter code.'; return; }

  errEl.textContent = '';
  input.disabled = true;

  const snap = await fbDb.ref(`games/${code}`).get();
  if (!snap.exists()) {
    errEl.textContent = 'Game not found. Check the code.';
    input.disabled = false; return;
  }
  const data = snap.val();
  if (data.guestConnected) {
    errEl.textContent = 'That game already has two players.';
    input.disabled = false; return;
  }
  if (data.gameOver && !data.newGameRequested) {
    errEl.textContent = 'That game has ended.';
    input.disabled = false; return;
  }

  onlineState.gameCode = code;
  onlineState.myRole   = 'X';
  registerGameCode(code);
  onlineState.myName   = gs.names.X;

  // Write guest name and mark connected
  await fbDb.ref(`games/${code}`).update({
    guestConnected: true,
    'names/X':      gs.names.X,
    lastActivity:   firebase.database.ServerValue.TIMESTAMP,
  });

  gs.playerXType = 'online';
  saveState();
  attachOnlineListener(code);
  setupPresence(code, 'guest');
}

// ══════════════════════════════
// FIREBASE LISTENER
// ══════════════════════════════
// ── Firebase returns nested arrays as objects — convert back ──
function fbToBoard(raw) {
  // raw is either already an array or an object like {0:{0:{0:null,...}}}
  const board = [];
  for (let l = 0; l < 4; l++) {
    const layer = [];
    for (let r = 0; r < 4; r++) {
      const row = [];
      for (let c = 0; c < 4; c++) {
        const v = raw && raw[l] && raw[l][r] ? (raw[l][r][c] ?? null) : null;
        row.push(v);
      }
      layer.push(row);
    }
    board.push(layer);
  }
  return board;
}

function fbToArray(raw) {
  // Converts a Firebase object-array like {0:'🍩',1:'🧁'} to ['🍩','🧁']
  if (Array.isArray(raw)) return raw;
  if (!raw) return [];
  return Object.keys(raw).sort((a,b) => +a - +b).map(k => raw[k]);
}

function attachOnlineListener(code) {
  if (onlineState.unsubscribe) onlineState.unsubscribe();

  const ref = fbDb.ref(`games/${code}`);
  onlineState.gameRef = ref;

  const handler = ref.on('value', snap => {
    if (!snap.exists()) return;
    const data = snap.val();

    // ── Sanitise Firebase data (arrays come back as objects) ──
    const safeBoard    = fbToBoard(data.board);
    const safeEmoji    = fbToArray(data.emojiPair);
    const safeTurn     = data.turn    || 'O';
    const safeGameOver = !!data.gameOver;
    const safeScores   = data.scores  || {O:0, X:0};
    const safeNames    = data.names   || {O:'Player O', X:'Player X'};

    // Guard: must have valid board and emoji before rendering
    if (!safeBoard || !safeEmoji || safeEmoji.length < 2) return;

    // ── Opponent abandoned the game ──
    if (data.abandoned && data.abandonedBy && data.abandonedBy !== onlineState.myRole) {
      leaveOnlineGame();
      gs.playerXType = 'human'; saveState();
      // Show notification in the disconnect banner
      const discBanner = document.getElementById('disconnect-banner');
      discBanner.querySelector('.disc-icon').textContent = '🚪';
      discBanner.querySelector('.disc-title').textContent = 'Opponent left the game';
      discBanner.querySelector('.disc-sub').textContent = 'The game has ended.';
      discBanner.querySelector('button').textContent = 'OK';
      discBanner.querySelector('button').onclick = () => {
        discBanner.classList.remove('active');
        discBanner.querySelector('.disc-icon').textContent = '🔌';
        discBanner.querySelector('.disc-title').textContent = 'Opponent disconnected';
        discBanner.querySelector('.disc-sub').textContent = 'Waiting for them to reconnect…';
        discBanner.querySelector('button').textContent = 'Abandon game';
        discBanner.querySelector('button').onclick = abandonOnlineGame;
        renderBoard();
      };
      discBanner.classList.add('active');
      return;
    }

    // ── Dismiss modal immediately (before any layout work) ──
    document.getElementById('online-modal').classList.remove('active');

    // ── Update opponent connection status ──
    const wasConnected = onlineState.opponentConnected;
    onlineState.opponentConnected = onlineState.myRole === 'O'
      ? !!data.guestConnected
      : !!data.hostConnected;

    // Host: update waiting modal or keep it open if guest hasn't joined yet
    if (onlineState.myRole === 'O' && !data.guestConnected) {
      document.getElementById('online-modal').classList.add('active');
      showOnlineModal('hosting', onlineState.gameCode);
    }

    // ── Detect last move from board diff (find newly placed cell) ──
    const prevGameOver = gs.gameOver;
    let detectedMove = null;
    outer: for (let li=0; li<4; li++)
      for (let ri=0; ri<4; ri++)
        for (let ci=0; ci<4; ci++)
          if (!gs.board[li][ri][ci] && safeBoard[li][ri][ci]) { detectedMove={l:li,r:ri,c:ci}; break outer; }
    if (detectedMove) {
      lastMove = detectedMove;
    } else if (!prevGameOver) {
      // No new move found — could be a new game reset; clear if board is empty
      const boardEmpty = safeBoard.every(layer => layer.every(row => row.every(c => !c)));
      if (boardEmpty) lastMove = null;
    }
    gs.board       = safeBoard;
    gs.turn        = safeTurn;
    gs.gameOver    = safeGameOver;
    gs.scores      = safeScores;
    gs.names       = safeNames;
    gs.emojiPair   = safeEmoji;
    gs.playerXType = 'online';

    // ── Disconnect banner: only show once both have connected at least once ──
    const discBanner = document.getElementById('disconnect-banner');
    const bothEverConnected = data.hostConnected !== undefined && data.guestConnected !== undefined;
    if (bothEverConnected && !gs.gameOver && !onlineState.opponentConnected) {
      discBanner.classList.add('active');
    } else {
      discBanner.classList.remove('active');
    }

    // ── Win cells ──
    winCells = new Set();
    if (gs.gameOver) {
      for (const p of ['O','X']) {
        const line = checkWin(p);
        if (line) { winCells = new Set(line.map(([l,r,c]) => `${l},${r},${c}`)); break; }
      }
    }

    requestAnimationFrame(() => {
      renderBoard();
      if (is3D && three) {
        if (detectedMove && !gs.gameOver) {
          // Just pop in the new sprite — don't reanimate the whole cube
          setTimeout(() => addSprite3D(detectedMove.l, detectedMove.r, detectedMove.c), 30);
        } else {
          // Game over or new game — full rebuild needed
          setTimeout(rebuild3D, 60);
        }
      }
    });

    // ── Win/draw banner ──
    if (gs.gameOver && !prevGameOver) {
      const winner = checkWinPlayer();
      setTimeout(() => {
        if (winner) showBanner('win', winner);
        else showBanner('draw', null);
      }, 400);
    }

    // ── Host new-game reset: once guest sees newGameRequested, host clears flag ──
    if (data.newGameRequested && onlineState.myRole === 'O') {
      setTimeout(() => {
        onlineState.gameRef && onlineState.gameRef.update({ newGameRequested: false });
      }, 300);
    }
  });

  onlineState.unsubscribe = () => ref.off('value', handler);
}

// ══════════════════════════════
// PRESENCE (connection tracking)
// ══════════════════════════════
function setupPresence(code, role) {
  const fieldName = role === 'host' ? 'hostConnected' : 'guestConnected';
  const gameRef   = fbDb.ref(`games/${code}`);

  // When this client disconnects, mark as offline
  gameRef.child(fieldName).onDisconnect().set(false);

  // Also clean up whole game after 30min inactivity (only host does this)
  if (role === 'host') {
    fbDb.ref(`games/${code}`).onDisconnect().remove();
  }
}

// ══════════════════════════════
// MOVE WRITING
// ══════════════════════════════
function onlineWriteMove(l, r, c) {
  if (!onlineState.gameRef) return;

  // Deep-copy board as a clean nested array (safe for Firebase)
  const newBoard = Array.from({length:4}, (_,li) =>
    Array.from({length:4}, (_,ri) =>
      Array.from({length:4}, (_,ci) => gs.board[li][ri][ci])
    )
  );
  const mover = gs.turn;
  newBoard[l][r][c] = mover;
  const nextTurn = mover === 'O' ? 'X' : 'O';

  // Snapshot gs, swap in new board, check outcome, restore
  const origBoard = gs.board;
  gs.board = newBoard;
  const winLine  = checkWin(mover);
  const draw     = !winLine && checkDraw();
  const inevit   = !winLine && !draw && isInevitableDraw();
  const gameOver = !!(winLine || draw || inevit);
  const newScores = {...gs.scores};
  if (winLine) newScores[mover]++;
  gs.board = origBoard;   // restore — listener will apply the authoritative state

  onlineState.gameRef.update({
    board:        newBoard,
    turn:         gameOver ? mover : nextTurn,
    gameOver:     gameOver,
    scores:       newScores,
    lastActivity: firebase.database.ServerValue.TIMESTAMP,
  });
}

// ══════════════════════════════
// HOST NEW GAME
// ══════════════════════════════
function onlineHostNewGame(keepScores) {
  if (!onlineState.gameRef) return;
  const scores = keepScores ? {...gs.scores} : {O:0, X:0};
  const fresh  = defaultState();
  onlineState.gameRef.update({
    board:            fresh.board,
    turn:             'O',
    gameOver:         false,
    scores:           scores,
    emojiPair:        fresh.emojiPair,
    newGameRequested: true,
    lastActivity:     firebase.database.ServerValue.TIMESTAMP,
  });
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function checkWinPlayer() {
  for (const p of ['O','X']) { if (checkWin(p)) return p; }
  return null;
}

function cancelHosting() {
  if (onlineState.gameCode) fbDb.ref(`games/${onlineState.gameCode}`).remove();
  leaveOnlineGame();
  showOnlineModal('choose');
}

function leaveOnlineGame() {
  if (onlineState.unsubscribe) { onlineState.unsubscribe(); onlineState.unsubscribe = null; }
  if (onlineState.gameRef) {
    const fieldName = onlineState.myRole === 'O' ? 'hostConnected' : 'guestConnected';
    onlineState.gameRef.update({ [fieldName]: false });
    onlineState.gameRef = null;
  }
  onlineState = { gameCode:null, myRole:null, myName:null, gameRef:null, unsubscribe:null, opponentConnected:false };
  document.getElementById('disconnect-banner').classList.remove('active');
  document.getElementById('online-modal').classList.remove('active');
}

function abandonOnlineGame() {
  leaveOnlineGame();
  gs.playerXType = 'human';
  saveState(); renderBoard();
}


</script>
