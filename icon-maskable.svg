    <circle cx="380" cy="146" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
    <!-- Row 2 -->
    <circle cx="146" cy="224" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
    <circle cx="224" cy="224" r="36" fill="#ff6b6b" opacity="0.9"/>
    <circle cx="302" cy="224" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
    <circle cx="380" cy="224" r="36" fill="#4ecdc4" opacity="0.9"/>
    <!-- Row 3 -->
    <circle cx="146" cy="302" r="36" fill="#4ecdc4" opacity="0.9"/>
    <circle cx="224" cy="302" r="36" fill="#ff6b6b" opacity="0.9"/>
