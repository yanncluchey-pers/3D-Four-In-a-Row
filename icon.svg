<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a3460"/>
      <stop offset="100%" stop-color="#111520"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 4x4 grid of circles representing the game board -->
  <!-- Row 1 -->
  <circle cx="146" cy="146" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
  <circle cx="224" cy="146" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
  <circle cx="302" cy="146" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
  <circle cx="380" cy="146" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
  <!-- Row 2 -->
  <circle cx="146" cy="224" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
  <circle cx="224" cy="224" r="36" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="302" cy="224" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
  <circle cx="380" cy="224" r="36" fill="#4ecdc4" opacity="0.9"/>
  <!-- Row 3 -->
  <circle cx="146" cy="302" r="36" fill="#4ecdc4" opacity="0.9"/>
  <circle cx="224" cy="302" r="36" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="302" cy="302" r="36" fill="#4ecdc4" opacity="0.9"/>
  <circle cx="380" cy="302" r="36" fill="#1e2540" stroke="#3a4570" stroke-width="3"/>
  <!-- Row 4 -->
  <circle cx="146" cy="380" r="36" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="224" cy="380" r="36" fill="#4ecdc4" opacity="0.9"/>
  <circle cx="302" cy="380" r="36" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="380" cy="380" r="36" fill="#ff6b6b" opacity="0.9"/>
  <!-- 3D perspective lines for depth effect -->
  <line x1="120" y1="120" x2="90" y2="90" stroke="#3a4570" stroke-width="2" opacity="0.4"/>
  <line x1="406" y1="120" x2="436" y2="90" stroke="#3a4570" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="406" x2="90" y2="436" stroke="#3a4570" stroke-width="2" opacity="0.4"/>
  <line x1="406" y1="406" x2="436" y2="436" stroke="#3a4570" stroke-width="2" opacity="0.4"/>
</svg>
